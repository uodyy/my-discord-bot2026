name: discord-bot
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: install
        run: npm install discord.js-selfbot-v13 @discordjs/voice
      - name: start
        env:
          TOKEN: ${{ secrets.TOKEN }}
        run: node index.js
